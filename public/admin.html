<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahayata | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background: #f8f7f5;">
    <!-- Animated Background Elements -->
    <div class="ambient-light moving-shape-1"></div>
    <div class="ambient-light moving-shape-2"></div>
    <div class="ambient-light moving-shape-3"></div>

    <nav class="navbar">
        <div class="nav-brand">
            <span style="font-size: 1.6rem;">Sahayata <span style="font-size:1rem; color:var(--accent-red);">| Admin Control</span></span>
        </div>
        <div class="nav-links">
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main class="dashboard" style="max-width: 1200px; margin: 0 auto;">
        <div style="margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Moderation Hub</h1>
            <p style="color: var(--text-muted);">Manage users and listings across the entire Sahayata network.</p>
        </div>

        <!-- Global Stats -->
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div class="glass-card" style="text-align:center;">
                <p style="font-size:0.9rem; color:var(--text-muted);">Total Donors</p>
                <h2 id="total-donors" style="font-size:2rem; color:var(--primary-color);">0</h2>
            </div>
            <div class="glass-card" style="text-align:center;">
                <p style="font-size:0.9rem; color:var(--text-muted);">Active NGOs</p>
                <h2 id="total-ngos" style="font-size:2rem; color:var(--secondary-color);">0</h2>
            </div>
            <div class="glass-card" style="text-align:center;">
                <p style="font-size:0.9rem; color:var(--text-muted);">Food Listings</p>
                <h2 id="total-listings" style="font-size:2rem; color:var(--text-main);">0</h2>
            </div>
        </div>

        <!-- Moderation Tables -->
        <div class="glass-card" style="margin-bottom: 30px; padding: 0; overflow: hidden;">
            <div style="padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); background: rgba(0,0,0,0.02);">
                <h3 style="font-size: 1.1rem;">Active Listings Moderation</h3>
            </div>
            <div style="overflow-x: auto;">
                <table style="width:100%; border-collapse: collapse; font-size: 0.9rem;">
                    <thead>
                        <tr style="text-align: left; background: rgba(0,0,0,0.02);">
                            <th style="padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);">Type</th>
                            <th style="padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);">Donor</th>
                            <th style="padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);">Status</th>
                            <th style="padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); text-align:right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="listings-table-body">
                        <!-- listings injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
             <!-- Donors Table -->
            <div class="glass-card" style="padding: 0; overflow: hidden;">
                <div style="padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); background: rgba(0,0,0,0.02); display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="font-size: 1.1rem;">Manage Donors</h3>
                </div>
                <div id="donors-list" style="max-height: 400px; overflow-y: auto; padding: 10px;">
                    <!-- donors injected here -->
                </div>
            </div>

            <!-- NGOs Table -->
            <div class="glass-card" style="padding: 0; overflow: hidden;">
                <div style="padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); background: rgba(0,0,0,0.02); display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="font-size: 1.1rem;">Manage NGOs</h3>
                </div>
                <div id="ngos-list" style="max-height: 400px; overflow-y: auto; padding: 10px;">
                    <!-- ngos injected here -->
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        
        const userJson = localStorage.getItem('sustaina_user_v3');
        if (!userJson || JSON.parse(userJson).role !== 'admin') {
            window.location.href = '/';
        }

        async function fetchAdminData() {
            const res = await fetch('/api/admin/overview');
            const data = await res.json();
            renderStats(data);
            renderListings(data.food_listings, data.donors);
            renderUsers(data.donors, 'donor', 'donors-list');
            renderUsers(data.ngos, 'ngo', 'ngos-list');
        }

        function renderStats(data) {
            document.getElementById('total-donors').innerText = data.donors.length;
            document.getElementById('total-ngos').innerText = data.ngos.length;
            document.getElementById('total-listings').innerText = data.food_listings.length;
        }

        function renderListings(listings, donors) {
            const tbody = document.getElementById('listings-table-body');
            tbody.innerHTML = '';
            listings.forEach(l => {
                const donor = donors.find(d => d.id === l.donor_id);
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid rgba(0,0,0,0.03)';
                tr.innerHTML = `
                    <td style="padding: 15px;"><b>${l.food_type}</b><br><small style="color:var(--text-muted)">${l.quantity}</small></td>
                    <td style="padding: 15px;">${donor ? donor.name : 'Unknown'}</td>
                    <td style="padding: 15px;"><span class="status-badge status-${l.status}" style="font-size:0.7rem;">${l.status}</span></td>
                    <td style="padding: 15px; text-align:right;">
                        <button onclick="deleteListing('${l.id}')" style="background:#fff1f1; color:var(--accent-red); border:1px solid #ffebeb; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:600;">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderUsers(users, role, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            users.forEach(u => {
                const div = document.createElement('div');
                div.style.cssText = "padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.03); display:flex; justify-content:space-between; align-items:center;";
                div.innerHTML = `
                    <div><b>${u.name}</b><br><small style="color:var(--text-muted)">${u.phone || u.location}</small></div>
                    <button onclick="deleteUser('${role}', '${u.id}')" style="background:transparent; color:var(--text-muted); border:none; cursor:pointer;">&times;</button>
                `;
                container.appendChild(div);
            });
        }

        async function deleteListing(id) {
            if (!confirm('Are you sure you want to delete this listing?')) return;
            await fetch(`/api/admin/delete-listing/${id}`, { method: 'DELETE' });
            fetchAdminData();
        }

        async function deleteUser(role, id) {
            if (!confirm(`Are you sure you want to delete this ${role}? All their associated data will be removed.`)) return;
            await fetch(`/api/admin/delete-user/${role}/${id}`, { method: 'DELETE' });
            fetchAdminData();
        }

        function logout() {
            localStorage.removeItem('sustaina_user_v3');
            window.location.href = '/';
        }

        socket.on('listing_updated', fetchAdminData);
        window.onload = fetchAdminData;

    </script>
</body>
</html>
